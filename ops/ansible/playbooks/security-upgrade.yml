---
- name: Apply security upgrades
  hosts: all
  become: true
  gather_facts: true
  tasks:
    - name: "[patch.packages.refresh] Refresh apt metadata"
      ansible.builtin.apt:
        update_cache: true

    - name: "[patch.packages.unattended_dependency] Ensure unattended upgrades is installed"
      ansible.builtin.apt:
        name: unattended-upgrades
        state: present

    - name: "[patch.packages.security_upgrade] Apply updates from configured security origins"
      ansible.builtin.command:
        cmd: unattended-upgrade --verbose
      register: security_upgrade
      changed_when: >-
        'Packages that will be upgraded:' in security_upgrade.stdout or
        'Packages that were successfully auto-removed:' in security_upgrade.stdout
