---
- name: Reboot after approved patching when required
  hosts: all
  become: true
  gather_facts: false
  tasks:
    - name: Reboot and wait for SSH to return
      ansible.builtin.reboot:
        msg: "Reboot approved by the AI Sysadmin operator"
        connect_timeout: 10
        reboot_timeout: 900
        post_reboot_delay: 15
