---
- name: Apply all available package updates
  hosts: all
  become: true
  gather_facts: true
  tasks:
    - name: "[patch.packages.refresh] Refresh apt metadata"
      ansible.builtin.apt:
        update_cache: true

    - name: "[patch.packages.full_upgrade] Apply distribution upgrades"
      ansible.builtin.apt:
        upgrade: dist
        autoremove: true
        autoclean: true
