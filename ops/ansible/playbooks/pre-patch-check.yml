---
- name: Run pre-patch safety checks
  hosts: all
  become: true
  gather_facts: true
  tasks:
    - name: Read available space on the root filesystem
      ansible.builtin.shell:
        cmd: "df -Pk / | awk 'NR==2 {print $4}'"
      register: root_available_kb
      changed_when: false

    - name: Require at least 1 GB free on the root filesystem
      ansible.builtin.assert:
        that:
          - root_available_kb.stdout | int >= 1048576
        fail_msg: "Less than 1 GB is free on the root filesystem."

    - name: Check package manager consistency
      ansible.builtin.command: dpkg --audit
      register: dpkg_audit
      changed_when: false
      failed_when: dpkg_audit.stdout | trim | length > 0

    - name: Record failed services before patching
      ansible.builtin.command: systemctl --failed --no-legend
      register: failed_services_before
      changed_when: false
      failed_when: false

    - name: Show the pre-patch service baseline
      ansible.builtin.debug:
        var: failed_services_before.stdout_lines

    - name: Require a clean service baseline before patching
      ansible.builtin.assert:
        that:
          - failed_services_before.stdout | trim | length == 0
        fail_msg: "Resolve failed systemd services before package changes are allowed."
