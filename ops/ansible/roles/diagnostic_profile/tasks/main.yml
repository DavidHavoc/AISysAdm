---
- name: "[evidence.system.os_release] Read operating system release"
  ansible.builtin.command: cat /etc/os-release
  register: ai_os_release
  changed_when: false

- name: "[evidence.system.kernel] Read kernel version"
  ansible.builtin.command: uname -r
  register: ai_kernel
  changed_when: false

- name: "[evidence.system.boot_id] Read boot identifier"
  ansible.builtin.command: cat /proc/sys/kernel/random/boot_id
  register: ai_boot_id
  changed_when: false

- name: "[evidence.system.reboot_history] Read bounded reboot history"
  ansible.builtin.shell:
    cmd: "last -x reboot shutdown -n 20 2>/dev/null || true"
  register: ai_reboot_history
  changed_when: false

- name: "[evidence.capacity.filesystems] Read filesystem capacity and type"
  ansible.builtin.command: df -PT -x tmpfs -x devtmpfs
  register: ai_filesystems
  changed_when: false

- name: "[evidence.capacity.inodes] Read inode capacity"
  ansible.builtin.command: df -Pi
  register: ai_inodes
  changed_when: false

- name: "[evidence.capacity.mounts] Read mount options"
  ansible.builtin.command: findmnt -rn -o TARGET,SOURCE,FSTYPE,OPTIONS
  register: ai_mounts
  changed_when: false

- name: "[evidence.packages.updates] Read pending package updates"
  ansible.builtin.shell:
    cmd: "apt list --upgradable 2>/dev/null"
  register: ai_updates
  changed_when: false

- name: "[evidence.packages.held] Read held packages"
  ansible.builtin.command: apt-mark showhold
  register: ai_held_packages
  changed_when: false
  failed_when: false

- name: "[evidence.packages.audit] Audit package-manager consistency"
  ansible.builtin.command: dpkg --audit
  register: ai_package_audit
  changed_when: false
  failed_when: false

- name: "[evidence.services.failed] Read failed systemd services"
  ansible.builtin.command: systemctl --failed --no-legend --plain
  register: ai_failed_services
  changed_when: false
  failed_when: false

- name: "[evidence.services.transitioning] Read transitioning services"
  ansible.builtin.command: systemctl list-units --state=activating,deactivating,reloading --no-legend --plain
  register: ai_transitioning_services
  changed_when: false
  failed_when: false

- name: "[evidence.logs.journal] Read bounded warning journal"
  ansible.builtin.command:
    argv:
      - journalctl
      - --since
      - "{{ ai_diagnostic_since }}"
      - -p
      - warning
      - -n
      - "{{ ai_max_journal_lines | string }}"
      - --no-pager
  register: ai_journal
  changed_when: false
  failed_when: false

- name: "[evidence.logs.kernel] Read bounded kernel warnings"
  ansible.builtin.command:
    argv:
      - journalctl
      - --since
      - "{{ ai_diagnostic_since }}"
      - -k
      - -p
      - warning
      - -n
      - "{{ ai_max_journal_lines | string }}"
      - --no-pager
  register: ai_kernel_journal
  changed_when: false
  failed_when: false

- name: "[evidence.logs.authentication] Read bounded SSH and sudo events"
  ansible.builtin.shell:
    cmd: >-
      journalctl --since '{{ ai_diagnostic_since }}'
      -u ssh -u sshd -t sudo
      -n {{ ai_max_journal_lines }} --no-pager
      | sed -E 's/([0-9]{1,3}\.){3}[0-9]{1,3}/[IP_ADDRESS]/g;
      s/(for user|for|user=)[^ ]+/\1[USERNAME]/g'
  register: ai_auth_events
  changed_when: false
  failed_when: false

- name: "[evidence.logs.apt_history] Read bounded apt history"
  ansible.builtin.shell:
    cmd: "tail -n {{ ai_max_history_lines }} /var/log/apt/history.log 2>/dev/null || true"
  register: ai_apt_history
  changed_when: false

- name: "[evidence.network.interfaces] Read network interfaces"
  ansible.builtin.command: ip -brief address
  register: ai_interfaces
  changed_when: false
  failed_when: false

- name: "[evidence.network.routes] Read network routes"
  ansible.builtin.command: ip route show
  register: ai_routes
  changed_when: false
  failed_when: false

- name: "[evidence.network.listening] Read bounded listening ports"
  ansible.builtin.shell:
    cmd: "ss -lntupH 2>/dev/null | head -n {{ ai_max_listening_ports }}"
  register: ai_listening_ports
  changed_when: false
  failed_when: false

- name: "[evidence.users.local] Read non-system user posture"
  ansible.builtin.shell:
    cmd: "getent passwd | awk -F: '$3 >= 1000 {print \"[USERNAME]:\" $3 \":\" $7}'"
  register: ai_users
  changed_when: false

- name: "[evidence.users.sudo] Read redacted sudo posture"
  ansible.builtin.shell:
    cmd: >-
      grep -RhsE '^[^#].*(ALL|NOPASSWD)'
      /etc/sudoers /etc/sudoers.d 2>/dev/null
      | sed -E 's/^[^ ]+/[USERNAME]/'
      | head -n 200 || true
  register: ai_sudo_posture
  changed_when: false
