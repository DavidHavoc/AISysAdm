services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: sysadmin_integration
      POSTGRES_HOST_AUTH_METHOD: trust
      POSTGRES_USER: sysadmin
    ports:
      - "127.0.0.1:55432:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U sysadmin -d sysadmin_integration
      interval: 1s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7-alpine
    command:
      - redis-server
      - --save
      - ""
      - --appendonly
      - "no"
    ports:
      - "127.0.0.1:56379:6379"
    tmpfs:
      - /data
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 1s
      timeout: 3s
      retries: 30
