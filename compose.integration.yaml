services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: sysadmin_integration
      POSTGRES_HOST_AUTH_METHOD: trust
      POSTGRES_USER: sysadmin
    ports:
      - "127.0.0.1:55432:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U sysadmin -d sysadmin_integration
      interval: 1s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7-alpine
    command:
      - redis-server
      - --save
      - ""
      - --appendonly
      - "no"
    ports:
      - "127.0.0.1:56379:6379"
    tmpfs:
      - /data
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 1s
      timeout: 3s
      retries: 30

  ubuntu-ssh:
    profiles:
      - real-host
    build:
      context: .
      dockerfile: ops/integration/real-host/Dockerfile
      args:
        BASE_IMAGE: ubuntu:24.04
    ports:
      - "127.0.0.1:${REAL_HOST_UBUNTU_PORT:-52222}:22"
    volumes:
      - ./.data/integration/real-host/authorized_keys:/home/sysadm/.ssh/authorized_keys:ro
    healthcheck:
      test:
        - CMD-SHELL
        - pgrep -x sshd >/dev/null
      interval: 1s
      timeout: 3s
      retries: 30

  debian-ssh:
    profiles:
      - real-host-debian
    build:
      context: .
      dockerfile: ops/integration/real-host/Dockerfile
      args:
        BASE_IMAGE: debian:12
    ports:
      - "127.0.0.1:${REAL_HOST_DEBIAN_PORT:-52223}:22"
    volumes:
      - ./.data/integration/real-host/authorized_keys:/home/sysadm/.ssh/authorized_keys:ro
    healthcheck:
      test:
        - CMD-SHELL
        - pgrep -x sshd >/dev/null
      interval: 1s
      timeout: 3s
      retries: 30
