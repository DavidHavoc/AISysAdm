---
- name: Test recovery diagnostics
  hosts: all
  become: true
  gather_facts: false
  tasks:
    - name: "[recovery.services.failed] Collect failed services"
      ansible.builtin.command: systemctl --failed --no-legend
      register: failed_services
      changed_when: false
      failed_when: false

    - name: "[recovery.packages.audit] Collect package manager audit"
      ansible.builtin.command: dpkg --audit
      register: dpkg_audit
      changed_when: false
      failed_when: false

    - name: "[recovery.report.summary] Report recovery diagnostics"
      ansible.builtin.debug:
        msg:
          failed_services: "{{ failed_services.stdout_lines }}"
          package_audit: "{{ dpkg_audit.stdout_lines }}"
