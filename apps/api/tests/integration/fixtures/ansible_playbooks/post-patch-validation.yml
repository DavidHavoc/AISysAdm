---
- name: Test post patch validation
  hosts: all
  become: true
  gather_facts: false
  tasks:
    - name: "[validation.packages.audit] Check package manager consistency"
      ansible.builtin.command: dpkg --audit
      register: dpkg_audit
      changed_when: false
      failed_when: dpkg_audit.stdout | trim | length > 0

    - name: "[validation.services.failed] Collect failed services"
      ansible.builtin.command: systemctl --failed --no-legend
      register: failed_services
      changed_when: false
      failed_when: false

    - name: "[validation.services.require_clean] Require systemd service validation to pass"
      ansible.builtin.assert:
        that:
          - failed_services.stdout | trim | length == 0
        fail_msg: "One or more services are failed after patching."
